  :root {
    --vm-blue: #008cff;
    --vm-blue-deep: #0074de;
    --vm-ink: #0a1f33;
    --vm-slate: #5b6b7a;
    --vm-line: #e7edf2;
    --vm-bg: #f4f8fb;
    --vm-card: #ffffff;
    --beige: #f6f3ec;
    --beige-ink: #4a4438;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Venmo Sans", system-ui, sans-serif;
    background:
      radial-gradient(1100px 600px at 50% -10%, #eaf4ff 0%, rgba(234,244,255,0) 60%),
      var(--vm-bg);
    color: var(--vm-ink);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 0 0 70px;
    transition: background .4s ease;
    overflow-x: hidden;
  }

  /* ---- top kickoff ticker ---- */
  .ticker {
    position: sticky; top: 0; z-index: 50; width: 100%;
    background: #0a1f33; color: #fff;
    box-shadow: 0 2px 16px -6px rgba(0,0,0,.4);
  }
  .ticker.live { background: #c0271a; }
  .ticker-inner {
    max-width: 960px; margin: 0 auto;
    display: flex; align-items: center; gap: 10px;
    padding: 9px 28px; font-size: 13px; font-weight: 700;
    white-space: nowrap; overflow-x: auto; scrollbar-width: none;
  }
  .ticker-inner::-webkit-scrollbar { display: none; }
  .ticker-logo {
    height: 18px; width: auto; flex: none; margin-right: 4px;
    filter: brightness(0) invert(1);
  }
  .ticker-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    opacity: .9; flex: none;
  }
  .ticker-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #fff;
    animation: tickerPulse 1.4s ease-in-out infinite;
  }
  @keyframes tickerPulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .ticker-sep { opacity: .45; flex: none; }
  .ticker-match { flex: none; }
  .ticker-when { font-weight: 600; opacity: .85; flex: none; }
  .ticker-count {
    font-variant-numeric: tabular-nums; flex: none;
    background: rgba(255,255,255,.16); padding: 3px 9px; border-radius: 6px;
  }
  .ticker-badge {
    margin-left: auto; flex: none;
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 800; letter-spacing: .06em;
    text-transform: uppercase; padding: 4px 10px; border-radius: 999px;
  }
  .ticker-badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .8; }
  .ticker-badge.work { background: #ffd23f; color: #5a4a00; }
  .ticker-badge.work::before {
    background: #e8201a; opacity: 1;
    animation: dotBlink 1s steps(1, end) infinite;
  }
  @keyframes dotBlink { 50% { opacity: 0; } }
  .ticker-badge.off { background: rgba(255,255,255,.2); color: #fff; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 28px 20px 0; }
  @media (min-width: 700px) {
    .wrap { max-width: 960px; padding: 40px 28px 0; }
  }

  /* ---- header ---- */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 34px;
  }
  .fpo-logo {
    display: flex; align-items: center; justify-content: center;
    height: 38px; padding: 0 16px;
    border: 1.5px dashed #b9c7d4;
    border-radius: 9px;
    color: #93a4b3;
    font-size: 11px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase;
    background: rgba(255,255,255,.5);
  }
  .nav-pill {
    font-size: 12px; font-weight: 600; color: var(--vm-slate);
    background: #fff; border: 1px solid var(--vm-line);
    border-radius: 999px; padding: 7px 14px;
  }

  /* ---- hero ---- */
  .hero { margin-bottom: 26px; }
  .title {
    font-size: clamp(52px, 11.5vw, 104px);
    font-weight: 800; line-height: .92; letter-spacing: -.04em;
    color: var(--vm-ink); margin-bottom: 22px;
  }
  .lede {
    font-size: clamp(19px, 2.6vw, 25px); line-height: 1.22;
    font-weight: 700; letter-spacing: -.01em; color: var(--vm-ink);
    margin-bottom: 12px;
  }
  .sub {
    font-size: 16px; line-height: 1.45; color: var(--vm-slate);
    font-weight: 500;
  }

  const rotation = {};
  function pickCover(bucket) {
    const i = (rotation[bucket.key] || 0) % bucket.covers.length;
    rotation[bucket.key] = i + 1;
    return bucket.covers[i];
  }

  // ---- conversational form: answers drive the bucket + plausibility ----
  const STEPS = [
    { id: "name", q: "First — what should we call you?", placeholder: "Type your name…" },
    { id: "occupation", q: "And what do you do all day?", placeholder: "Type your job…" },
    { id: "reliability", q: "Do you have a reputation for reliability?", placeholder: "Type your answer…" },
    { id: "boss", q: "How’s your relationship with your boss?", placeholder: "Type your answer…" },
    { id: "notice", q: "How far in advance are you calling out?", placeholder: "Type your answer…" },
    { id: "where", q: "Where are you watching the game?", placeholder: "Type your answer…" },
    { id: "return", q: "Do you have to go back to work afterwards?", placeholder: "Type your answer…" },
  ];

  const answers = {};
  let mode = "intro";        // "intro" | "questions"
  let stepIndex = 0;
  const esc = (s) => s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");

  function renderIntro() {
    mode = "intro";
    document.body.classList.add("asking");
    $("flowStage").innerHTML =
      '<div class="screen intro">' +
        '<div class="intro-copy">' +
          '<h1 class="title">The Excuse Exchange by <img class="title-logo" src="Venmo_Logo.svg" alt="Venmo" /></h1>' +
          '<p class="lede">The big tournament is in North America this year. So the matches aren’t at night — they’re right in the middle of your workday.</p>' +
          '<p class="sub">And while we can’t move the matches, we <i>can</i> give you a pretty good reason to leave work.</p>' +
          '<div class="q-actions">' +
            '<button class="go-btn big" id="beginBtn">Start <span class="enter-hint">press Enter ↵</span></button>' +
          '</div>' +
        '</div>' +
        '<img class="ball" src="ball.png" alt="" aria-hidden="true" />' +
      '</div>';
    $("beginBtn").onclick = startQuestions;
    $("beginBtn").focus();
  }

  function startQuestions() { mode = "questions"; stepIndex = 0; document.body.classList.add("asking"); renderStep(); }

  function renderStep() {
    const s = STEPS[stepIndex];
    const last = stepIndex === STEPS.length - 1;
    const val = answers[s.id] ? ' value="' + esc(answers[s.id]) + '"' : "";
    $("flowStage").innerHTML =
      '<div class="screen">' +
        '<div class="q-eyebrow">Question ' + (stepIndex + 1) + ' of ' + STEPS.length + '</div>' +
        '<label class="q-text" for="stepInput">' + s.q + "</label>" +
        '<input class="q-input" id="stepInput" type="text" autocomplete="off" placeholder="' + esc(s.placeholder) + '"' + val + " />" +
        '<div class="q-actions">' +
          '<button class="go-btn" id="okBtn">' + (last ? "Get my exit" : "OK") + ' <span class="enter-hint">press Enter ↵</span></button>' +
          '<button class="back-link" id="backBtn">← back</button>' +
        '</div>' +
      "</div>";

    const inp = $("stepInput");
    inp.focus();
    inp.oninput = () => { answers[s.id] = inp.value.trim(); };
    inp.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); goNext(); } };
    $("okBtn").onclick = goNext;
    $("backBtn").onclick = goPrev;
  }

  function goNext() {
    const s = STEPS[stepIndex];
    if (!answers[s.id]) { const inp = $("stepInput"); if (inp) inp.focus(); return; }
    if (stepIndex < STEPS.length - 1) { stepIndex++; renderStep(); }
    else { submitForm(); }
  }
  function goPrev() {
    if (stepIndex === 0) { renderIntro(); return; }
    stepIndex--; renderStep();
  }

  // ---- interpret free-text answers ----
  const v = (s) => (s || "").toLowerCase();
  function relRank(s) { s = v(s);
    if (/spotless|impeccable|very|extremely|always|gold|reliable|dependable|never late|rock solid|solid|yes|of course/.test(s)) return "high";
    if (/\bno\b|not really|nope|unreliable|flaky|flake|late|terrible|honestly no|nah|lol/.test(s)) return "low";
    return "mid";
  }
  function bossRank(s) { s = v(s);
    if (/great|good|love|tight|friend|friendly|cool|awesome|amazing|close|solid|chill|buddy|like (her|him|them)/.test(s)) return "good";
    if (/bad|terrible|tense|rocky|hate|awful|scared|afraid|strained|cold|distant|not great|sucks|fear|micromanage|toxic/.test(s)) return "bad";
    return "neutral";
  }
  function noticeRank(s) { s = v(s);
    if (/now|last minute|right now|currently|mid|kicking off|live|immediately|asap|spur|this second|already/.test(s)) return "now";
    if (/day|days|week|month|advance|ahead|early|planned|tomorrow|next/.test(s)) return "days";
    return "today";
  }
  function whereKey(s) { s = v(s);
    if (/bar|pub|tavern|brewery|happy hour/.test(s)) return "bar";
    if (/friend|buddy|mate|someone|their place|his place|her place/.test(s)) return "friend";
    if (/stadium|arena|in person|the field|the match itself|going to the game/.test(s)) return "stadium";
    return "home"; // home, couch, apartment, desk, etc.
  }
  function mustReturn(s) { s = v(s);
    if (/\bno\b|nope|nah|off\b|gone|done|free|rest of|home for the day|not going back|i'?m out/.test(s)) return false;
    if (/\byes\b|yeah|yep|have to|gotta|back|return|after|unfortunately|sadly|of course/.test(s)) return true;
    return false;
  }

  function bucketFor() {
    const key = (k) => BUCKETS.find((b) => b.key === k);
    const w = whereKey(answers.where);
    if (w === "stadium") return key("longrun");
    if (mustReturn(answers.return)) return key("longrun");
    if (w === "bar" || w === "friend") return key("social");
    return key("watch");
  }
  function scoreFor() {
    let s = 84;
    s += ({ high: 8, mid: 3, low: -7 })[relRank(answers.reliability)] || 0;
    s += ({ good: 6, neutral: 2, bad: -8 })[bossRank(answers.boss)] || 0;
    s += ({ days: 7, today: 1, now: -9 })[noticeRank(answers.notice)] || 0;
    return Math.max(58, Math.min(98, s));
  }
  function replyFor(s) { return s >= 92 ? "✅" : s >= 82 ? "👍" : s >= 72 ? "🫡" : "👀"; }
  function noteFor(s) {
    if (noticeRank(answers.notice) === "now") return "Calling out mid-kickoff is bold. We did what we could.";
    if (bossRank(answers.boss) === "bad") return "Rocky manager dynamic factored in — keep it short.";
    if (relRank(answers.reliability) === "low") return "Your track record isn’t helping. Send and pray.";
    if (s >= 92) return "Reliable, well-liked, planned ahead. Practically unimpeachable.";
    return "Plausible. Don’t over-explain if they reply.";
  }

  function submitForm() {
    const cover = pickCover(bucketFor());
    const score = scoreFor();
    const name = (answers.name || "you").trim();

    $("resultIntro").textContent = "Nice work, " + name + ". Here’s your exit.";
    $("excuseText").textContent = cover.written;
    $("payee").textContent = cover.payee;
    $("emoji").textContent = cover.emoji;
    $("avatar").textContent = (cover.payee || "?").trim().charAt(0).toUpperCase();
    $("time").textContent = nowLabel();
    $("auditScore").textContent = score + "%";
    $("auditNote").textContent = noteFor(score);
    $("auditReply").textContent = replyFor(score);
    $("auditFill").style.width = "0%";

    $("flow").classList.add("hidden");
    document.body.classList.remove("asking");
    $("output").classList.remove("hidden");
    $("output").scrollIntoView({ behavior: "smooth", block: "nearest" });
    requestAnimationFrame(() => requestAnimationFrame(() => { $("auditFill").style.width = score + "%"; }));
  }

  function startOver() {
    for (const k in answers) delete answers[k];
    $("output").classList.add("hidden");
    $("flow").classList.remove("hidden");
    renderIntro();
    $("flow").scrollIntoView({ behavior: "smooth", block: "start" });
  }

  // Enter on the intro screen begins the flow
  document.addEventListener("keydown", (e) => {
    if (mode === "intro" && e.key === "Enter") { e.preventDefault(); startQuestions(); }
  });

  $("startOver").onclick = startOver;
  renderIntro();

</script>
